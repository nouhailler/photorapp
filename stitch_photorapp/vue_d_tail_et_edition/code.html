<script>
        function toggleInfo() {
            const panel = document.getElementById('infoPanel');
            panel.classList.toggle('translate-x-full');
        }

        function toggleEditMode() {
            const controls = document.getElementById('editControls');
            controls.classList.toggle('hidden');
            const photo = document.getElementById('mainPhoto');
            if (!controls.classList.contains('hidden')) {
                photo.style.transform = 'scale(0.9) translateY(-40px)';
            } else {
                photo.style.transform = 'scale(1) translateY(0)';
            }
        }

        function toggleFavorite(btn) {
            const icon = btn.querySelector('#favIcon');
            const isFilled = icon.style.fontVariationSettings.includes("'FILL' 1");
            if (isFilled) {
                icon.style.fontVariationSettings = "'FILL' 0";
                icon.classList.remove('text-primary');
                icon.classList.add('text-on-surface-variant');
            } else {
                icon.style.fontVariationSettings = "'FILL' 1";
                icon.classList.remove('text-on-surface-variant');
                icon.classList.add('text-primary');
            }
        }

        // Tap on main canvas to hide/show UI (immersive feature)
        let uiVisible = true;
        document.getElementById('mainCanvas').addEventListener('click', (e) => {
            // Only trigger if clicking on the main photo background, not buttons
            if (e.target === e.currentTarget || e.target.id === 'mainPhoto') {
                const elements = [
                    document.querySelector('header'),
                    document.querySelector('nav'),
                    document.querySelector('.absolute.bottom-24'), // dots
                    document.querySelector('.absolute.bottom-28')  // adjust btn
                ];
                uiVisible = !uiVisible;
                elements.forEach(el => {
                    if (el) el.style.opacity = uiVisible ? '1' : '0';
                    if (el) el.style.pointerEvents = uiVisible ? 'auto' : 'none';
                });
            }
        });
    </script>
